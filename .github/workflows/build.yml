name: Build Wheels

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.17
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-musllinux_* cp38-macosx_arm64"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_BEFORE_BUILD: pip install pybind11
          CIBW_ENVIRONMENT_MACOS: CXX=clang++ CC=clang
          CIBW_ENVIRONMENT_WINDOWS: PYTHONIOENCODING=utf-8

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 30

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools pybind11

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  test_wheels:
    name: Test wheel on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10']
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse

      - name: Install wheel and dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install networkx numpy tqdm
          pip install --find-links=wheelhouse pynetim

      - name: Test basic import (without torch)
        shell: bash
        run: |
          python -c "from pynetim import IMGraph; print('IMGraph import OK')"
          python -c "from pynetim.diffusion_model import IndependentCascadeModel; print('IC Model import OK')"
          python -c "from pynetim.algorithms import IMMAlgorithm; print('IMM Algorithm import OK')"
          python -c "from pynetim.algorithms import DegreeCentralityAlgorithm; print('Heuristic import OK')"
          python -c "from pynetim.algorithms import GreedyAlgorithm; print('Simulation import OK')"
          python -c "from pynetim.algorithms import BaseRLAlgorithm, CoreQAlgorithm; print('RL import OK')"
          python -c "from pynetim.algorithms import SADPEAAlgorithm; print('Population import OK')"
          python -W error::ImportWarning -c "
          import warnings
          warnings.filterwarnings('error', category=ImportWarning)
          try:
              from pynetim.algorithms import BiGDNAlgorithm
              assert BiGDNAlgorithm is None, 'BiGDNAlgorithm should be None without torch'
          except ImportWarning as e:
              print(f'Got expected ImportWarning: {e}')
          "

      - name: Install torch and test deep learning algorithms
        shell: bash
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -c "from pynetim.algorithms import BiGDNAlgorithm, ToupleGDDAlgorithm, RLSetGWOAlgorithm; print('Deep learning algorithms import OK')"

  release:
    name: Create Release
    needs: [build_wheels, build_sdist, test_wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move all wheels and sdist to dist
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec mv {} dist/ \;
          find artifacts -name "*.tar.gz" -exec mv {} dist/ \;
          ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
